name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          mkdir release
          copy build\Release\WorkshopMapLoader.dll release\
          copy WorkshopMapLoader.set release\
          Compress-Archive -Path release\* -DestinationPath WorkshopMapLoader-${{ github.ref_name }}.zip
        shell: powershell

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: WorkshopMapLoader-${{ github.ref_name }}.zip
          generate_release_notes: true
